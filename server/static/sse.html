<!DOCTYPE html>
<html>
<head>
    <title>AI 流式对话 - 可随时停止</title>
</head>
<body>
    <div>
        <textarea id="promptInput" rows="3" cols="50"></textarea><br>
        <button id="sendBtn">发送请求</button>
        <button id="stopBtn" disabled>停止生成</button>
    </div>
    <div id="output" style="margin-top: 20px; padding: 10px; border: 1px solid #ccc; min-height: 100px; white-space: pre-wrap;"></div>

    <script>
        let abortController = null;
        const sendBtn = document.getElementById('sendBtn');
        const stopBtn = document.getElementById('stopBtn');
        const outputDiv = document.getElementById('output');
        const promptInput = document.getElementById('promptInput');

        sendBtn.onclick = async () => {
            if (abortController) abortController.abort();
            abortController = new AbortController();
            const signal = abortController.signal;

            sendBtn.disabled = true;
            stopBtn.disabled = false;
            outputDiv.innerText = '';

            try {
                const prompt = encodeURIComponent(promptInput.value);
                const response = await fetch(`/api/stream?prompt=${prompt}`, { signal });
                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    outputDiv.innerText += decoder.decode(value);
                }
            } catch (err) {
                if (err.name !== 'AbortError') outputDiv.innerText = `错误: ${err.message}`;
            } finally {
                sendBtn.disabled = false;
                stopBtn.disabled = true;
                abortController = null;
            }
        };

        stopBtn.onclick = () => {
            if (abortController) abortController.abort();
        };
    </script>
</body>
</html>
